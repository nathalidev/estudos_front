<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card de produto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=favorite" />
</head>
<body>
    <div id="card">
        <div id="image">
            <img src="img/tenis.jpeg" alt="Tênis Runner X">
            <div id="favorite">
                <span class="material-symbols-outlined">
                    favorite
                </span>
            </div>
        </div>
        <h2>Tênis Runner X</h2>
        <p>Ideal para corridas e treinos diários.</p>
        <p>Conforto, leveza e performance.</p>
        <p id="price">R$ 199,90</p>
        <s>R$ 249,90</s>
        <button>
            <i class="fa-solid fa-cart-shopping"></i>
            Comprar
        </button>
    </div>
</body>
</html>
